<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Web Controller</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            color: #4CAF50;
        }
        #controller-container {
            position: relative;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        canvas {
            display: block;
        }
        #controls {
            margin-top: 20px;
        }
        #stop-recording {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #stop-recording:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <h1>Minecraft Browser Controller (MCP Mode)</h1>
    <div id="controller-container">
        <canvas id="controller-canvas"></canvas>
    </div>
    <div id="controls">
        <button id="stop-recording">Stop & Download Trajectory</button>
    </div>
    <!-- 
        This assumes you are using a bundler like Webpack, Vite, or Parcel 
        to compile the TypeScript and create a single bundle file.
    -->
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
