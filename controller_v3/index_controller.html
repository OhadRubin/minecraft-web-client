<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamepad Controller</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        #canvas {
            border: 2px solid #333;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }
        
        #status {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
        
        .connected {
            color: #4CAF50;
        }
        
        .disconnected {
            color: #f44336;
        }
        
        .gamepad-detected {
            color: #ff9800;
        }
    </style>
</head>

<body>
    <div id="container">
        <canvas id="canvas" width="800" height="600"></canvas>
        <div id="status">
            <div id="websocket-status" class="disconnected">WebSocket: Disconnected</div>
            <div id="gamepad-status">Physical Gamepads: 0</div>
        </div>
        <div id="trigger-controls" style="margin-top: 15px; text-align: center; border-top: 1px solid #ccc; padding-top: 15px;">
            <h4 style="margin: 0 0 10px 0; color: #333;">L2/R2 Trigger Settings</h4>
            <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                <div>
                    <label for="trigger-duration" style="display: block; font-size: 12px; color: #666;">Duration (ms)</label>
                    <input type="number" id="trigger-duration" value="50" min="1" max="1000" style="width: 80px; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 3px;">
                </div>
                <div>
                    <label for="trigger-interval" style="display: block; font-size: 12px; color: #666;">Interval (ms)</label>
                    <input type="number" id="trigger-interval" value="16" min="1" max="1000" style="width: 80px; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 3px;">
                </div>
            </div>
            <div style="font-size: 11px; color: #888; margin-top: 8px;">
                Duration: How long each press lasts | Interval: Time between presses
            </div>
        </div>
    </div>

    <script type="module">
        import { GamepadController } from './dist/GamepadController.js';
        
        // Initialize the gamepad controller when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('canvas');
            if (canvas) {
                new GamepadController(canvas);
            }
        });
    </script>
</body>

</html>
