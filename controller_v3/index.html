<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamepad Controller</title>
    
    <!-- Screenshot Gallery Styles -->
    <link rel="stylesheet" href="dist/ScreenshotGallery.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 24px;
        }

        #status-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 16px;
            justify-content: center;
            align-items: center;
        }

        #websocket-status, #gamepad-status, #trigger-settings {
            padding: 10px 15px;
            border-radius: 5px;
            background-color: #ddd;
        }

        .trigger-control {
            display: flex;
            gap: 10px;
            margin: 5px 0;
            font-size: 12px;
        }

        .trigger-control label {
            min-width: 80px;
            display: flex;
            align-items: center;
        }

        .trigger-control input {
            width: 60px;
            padding: 2px 4px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        #websocket-status.connected {
            background-color: #4CAF50;
            color: white;
        }

        #websocket-status.disconnected {
            background-color: #f44336;
            color: white;
        }

        #gamepad-status.gamepad-detected {
            background-color: #2196F3;
            color: white;
        }

        .app-grid {
            width: 100%;
            height: calc(100vh - 200px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            flex: 1;
        }

        .grid-section {
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            background-color: #f8f9fa;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
            text-align: center;
            color: #333;
        }

        #canvas {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            height: 100%;
            max-height: calc(100% - 30px);
        }

        .terminal {
            width: 100%;
            height: 100%;
            max-height: calc(100% - 30px);
            border: 1px solid #ccc;
            border-radius: 3px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
            resize: none;
            box-sizing: border-box;
        }


        /* Screenshot Gallery Styles */
        .screenshot-gallery {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .screenshot-gallery .image-gallery {
            flex: 1;
            height: 100%;
        }

        .screenshot-gallery-empty {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            color: #666;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .empty-state p {
            margin: 0 0 15px 0;
            color: #777;
        }

        .empty-features {
            font-size: 12px;
            color: #999;
        }

        .empty-features div {
            margin: 3px 0;
        }

        /* Image Gallery Metadata Styles */
        .screenshot-metadata {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
        }

        .metadata-row {
            margin: 3px 0;
            line-height: 1.4;
        }

        .thumbnail-metadata {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 5px;
            font-size: 10px;
            text-align: center;
        }

        .thumbnail-time {
            font-weight: bold;
        }

        .thumbnail-position {
            font-size: 9px;
            opacity: 0.9;
        }

        .gallery-status {
            text-align: center;
            padding: 5px;
            font-size: 12px;
            color: #666;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
        }

        /* Override image gallery default styles to fit our layout */
        .image-gallery-slide img {
            max-height: 300px !important;
        }

        .image-gallery-thumbnails-wrapper {
            max-height: 80px !important;
        }

        .image-gallery-thumbnail {
            width: 80px !important;
            height: 60px !important;
        }
    </style>
</head>
<body>
    <h1>Gamepad Controller Interface</h1>
    
    <div id="status-container">
        <div id="websocket-status" class="disconnected">WebSocket: Disconnected</div>
        <div id="gamepad-status">Physical Gamepads: 0</div>
        <div id="trigger-settings">
            <strong>Trigger Settings</strong>
            <div class="trigger-control">
                <label for="trigger-duration">Duration (ms):</label>
                <input type="number" id="trigger-duration" min="1" max="1000" value="50">
            </div>
            <div class="trigger-control">
                <label for="trigger-interval">Interval (ms):</label>
                <input type="number" id="trigger-interval" min="1" max="1000" value="16">
            </div>
        </div>
    </div>

    <div class="app-grid">
        <div class="grid-section">
            <div class="section-title">WebSocket Commands Log</div>
            <textarea id="terminal" class="terminal" readonly></textarea>
        </div>
    
        <div class="grid-section">
            <div class="section-title">Controller</div>
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>
        
        <div class="grid-section">
            <div class="section-title">Bot Status (Event-Driven)</div>
            <textarea id="terminal1" class="terminal" readonly placeholder="📊 Bot Status - Event Driven - Waiting for events..."></textarea>
        </div>
        
        <div class="grid-section">
            <div class="section-title">Screenshot Gallery</div>
            <div id="react-image-gallery-root" style="height: calc(100% - 30px);"></div>
        </div>
        </div>


    <script type="module">
        import { GamepadController } from './dist/GamepadController.js';
        
                // Initialize terminals
        const terminal = document.getElementById('terminal');
                const terminal1=document.getElementById('terminal1');
            
        terminal.value = '🎮 WebSocket Commands Log initialized\n' + '='.repeat(50) + '\n';
                terminal1.value='📊 Bot Status - Event Driven\n'+'='.repeat(50)+'\n';
        
                // Make terminals globally accessible for logging
        window.gamepadTerminal = {
            writeln: function(text) {
                terminal.value += text + '\n';
                terminal.scrollTop = terminal.scrollHeight;
            },
            writeToTerminal1: function (text) {
                terminal1.value+=text+'\n';
                terminal1.scrollTop=terminal1.scrollHeight;
            },
            clearTerminal1: function() {
                terminal1.value = '📊 Bot Status - Event Driven\n' + '='.repeat(50) + '\n';
            },
            writeToTerminal2: function (text) {
                // Legacy compatibility - now handled by React component
                console.log('Terminal2 (now React Gallery):', text);
                
                // Try to update React gallery with screenshot data if applicable
                if (window.updateScreenshotGallery && typeof text === 'string' && text.includes('screenshot')) {
                    window.updateScreenshotGallery(text);
                }
            }
        };
        
        // Initialize the gamepad controller
        const controller = new GamepadController('canvas', 'ws://localhost:8081');
        
        // Load and mount React Screenshot Gallery
        import('./dist/ScreenshotGallery.js').then(module => {
            console.log('📦 ScreenshotGallery module loaded:', module);
            
            // The bundled component should expose a mount function
            if (module.mountScreenshotGallery) {
                const galleryRoot = document.getElementById('react-image-gallery-root');
                if (galleryRoot) {
                    module.mountScreenshotGallery(galleryRoot);
                    
                    // Screenshot gallery will be updated when new screenshots arrive via WebSocket events
                    console.log("📸 Screenshot gallery mounted and ready for updates");
                }
            } else {
                console.error('❌ mountScreenshotGallery function not found in module');
            }
        }).catch(error => {
            console.error('Failed to load ScreenshotGallery:', error);
            // Fallback: simple display
            const galleryRoot = document.getElementById('react-image-gallery-root');
            if (galleryRoot) {
                galleryRoot.innerHTML = '<div style="padding: 20px; text-align: center;">📸 Screenshot Gallery Loading...</div>';
            }
        });
        
        // Handle cleanup on page unload
        window.addEventListener('beforeunload', () => {
            controller.destroy();
            // Unmount React component
            const galleryRoot = document.getElementById('react-image-gallery-root');
            if (galleryRoot) {
                ReactDOM.unmountComponentAtNode(galleryRoot);
            }
        });
    </script>
</body>
</html>
