<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Gallery Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/react-image-gallery@1.3.0/styles/css/image-gallery.css">
    <script src="https://unpkg.com/react-image-gallery@1.3.0/build/image-gallery.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        
        .test-container {
            width: 600px;
            height: 400px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #f8f9fa;
            padding: 10px;
        }
        
        /* Screenshot Gallery Styles */
        .screenshot-gallery {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .screenshot-gallery .image-gallery {
            flex: 1;
            height: 100%;
        }

        .screenshot-gallery-empty {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            color: #666;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .empty-state p {
            margin: 0 0 15px 0;
            color: #777;
        }

        .empty-features {
            font-size: 12px;
            color: #999;
        }

        .empty-features div {
            margin: 3px 0;
        }

        /* Image Gallery Metadata Styles */
        .screenshot-metadata {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
        }

        .metadata-row {
            margin: 3px 0;
            line-height: 1.4;
        }

        .thumbnail-metadata {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 5px;
            font-size: 10px;
            text-align: center;
        }

        .thumbnail-time {
            font-weight: bold;
        }

        .thumbnail-position {
            font-size: 9px;
            opacity: 0.9;
        }

        .gallery-status {
            text-align: center;
            padding: 5px;
            font-size: 12px;
            color: #666;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
        }

        /* Override image gallery default styles to fit our layout */
        .image-gallery-slide img {
            max-height: 300px !important;
        }

        .image-gallery-thumbnails-wrapper {
            max-height: 80px !important;
        }

        .image-gallery-thumbnail {
            width: 80px !important;
            height: 60px !important;
        }

        .test-buttons {
            margin: 20px 0;
        }

        .test-buttons button {
            margin: 5px;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        .test-buttons button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Screenshot Gallery Test</h1>
    <p>This page tests the React Image Gallery component with mock screenshot data.</p>
    
    <div class="test-buttons">
        <button onclick="loadMockScreenshots()">Load Mock Screenshots</button>
        <button onclick="clearScreenshots()">Clear Screenshots</button>
        <button onclick="addSingleScreenshot()">Add Single Screenshot</button>
    </div>
    
    <div class="test-container">
        <div id="gallery-root"></div>
    </div>

    <script>
        // Mock screenshot data generator
        function generateMockScreenshot(index) {
            // Create a simple colored canvas as base64 image
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 300;
            const ctx = canvas.getContext('2d');
            
            // Random background color
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b', '#eb4d4b'];
            ctx.fillStyle = colors[index % colors.length];
            ctx.fillRect(0, 0, 400, 300);
            
            // Add some text
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Mock Screenshot ${index + 1}`, 200, 150);
            
            const imageData = canvas.toDataURL('image/png').split(',')[1];
            
            return {
                image: imageData,
                timestamp: Date.now() - (index * 60000), // 1 minute apart
                width: 400,
                height: 300,
                botStatus: {
                    position: [30 + index, 63, -18 - index],
                    yaw: (index * 0.5) % (2 * Math.PI),
                    pitch: ((index * 0.3) % 1) - 0.5,
                    health: 20 - (index % 5),
                    food: 20 - (index % 3),
                    biome: ['Forest', 'Plains', 'Desert', 'Jungle', 'Mountains'][index % 5],
                    dimension: 'overworld',
                    gameTime: 6000 + (index * 1000),
                    selectedSlot: index % 9,
                    inventory: [],
                    lookingAt: index % 3 === 0 ? {
                        name: ['Stone', 'Dirt', 'Wood'][index % 3],
                        position: [31 + index, 63, -17 - index],
                        distance: 2.5 + (index % 3)
                    } : undefined
                }
            };
        }

        // Create the screenshot gallery component
        const ScreenshotGallery = ({ screenshots = [], maxScreenshots = 20 }) => {
            const [screenshotList, setScreenshotList] = React.useState(screenshots);
            const [currentIndex, setCurrentIndex] = React.useState(0);

            // Format timestamp for display
            const formatTimestamp = React.useCallback((timestamp) => {
                return new Date(timestamp).toLocaleTimeString();
            }, []);

            // Format bot position for display
            const formatPosition = React.useCallback((position) => {
                const [x, y, z] = position;
                return `(${x.toFixed(1)}, ${y.toFixed(1)}, ${z.toFixed(1)})`;
            }, []);

            // Generate event description
            const generateEventDescription = React.useCallback((screenshot, index) => {
                const timestamp = formatTimestamp(screenshot.timestamp);
                const position = screenshot.botStatus ? formatPosition(screenshot.botStatus.position) : 'Unknown';
                
                let eventType = 'Screenshot Captured';
                if (screenshot.botStatus?.lookingAt) {
                    eventType = `Viewing ${screenshot.botStatus.lookingAt.name}`;
                }
                
                return `${timestamp} - ${eventType} - Position ${position}`;
            }, [formatTimestamp, formatPosition]);

            // Update screenshots from external source
            React.useEffect(() => {
                window.updateScreenshotGallery = (newScreenshots) => {
                    console.log('Gallery update received:', newScreenshots);
                    if (Array.isArray(newScreenshots)) {
                        setScreenshotList(newScreenshots.slice(0, maxScreenshots));
                        if (newScreenshots.length > 0) {
                            setCurrentIndex(0);
                        }
                    }
                };

                return () => {
                    delete window.updateScreenshotGallery;
                };
            }, [maxScreenshots]);

            // Convert screenshots to gallery format
            const galleryItems = screenshotList.map((screenshot, index) => {
                const dataUrl = `data:image/png;base64,${screenshot.image}`;
                const description = generateEventDescription(screenshot, index);
                
                return {
                    original: dataUrl,
                    thumbnail: dataUrl,
                    description: description,
                    originalTitle: description
                };
            });

            // Empty state
            if (screenshotList.length === 0) {
                return React.createElement('div', {
                    className: 'screenshot-gallery-empty'
                }, React.createElement('div', {
                    className: 'empty-state'
                }, [
                    React.createElement('div', { key: 'icon', className: 'empty-icon' }, '📸'),
                    React.createElement('h3', { key: 'title' }, 'No Screenshots Yet'),
                    React.createElement('p', { key: 'desc' }, 'Screenshots will appear here when captured from Minecraft'),
                    React.createElement('div', { key: 'features', className: 'empty-features' }, [
                        React.createElement('div', { key: 'f1' }, '✅ WebSocket integration ready'),
                        React.createElement('div', { key: 'f2' }, '✅ React Image Gallery loaded'),
                        React.createElement('div', { key: 'f3' }, '✅ Metadata display configured')
                    ])
                ]));
            }

            // Gallery with screenshots
            return React.createElement('div', {
                className: 'screenshot-gallery'
            }, [
                React.createElement(ImageGallery, {
                    key: 'gallery',
                    items: galleryItems,
                    currentIndex: currentIndex,
                    onSlide: setCurrentIndex,
                    showThumbnails: true,
                    showFullscreenButton: false,
                    showPlayButton: false,
                    showBullets: false,
                    showNav: true,
                    thumbnailPosition: 'bottom',
                    renderItem: (item) => {
                        const screenshot = screenshotList[galleryItems.indexOf(item)];
                        if (!screenshot) return null;

                        return React.createElement('div', {
                            className: 'image-gallery-image'
                        }, [
                            React.createElement('img', {
                                key: 'img',
                                src: item.original,
                                alt: item.description,
                                style: { maxWidth: '100%', maxHeight: '300px', objectFit: 'contain' }
                            }),
                            React.createElement('div', {
                                key: 'desc',
                                className: 'image-gallery-description'
                            }, React.createElement('div', {
                                className: 'screenshot-metadata'
                            }, [
                                React.createElement('div', {
                                    key: 'time',
                                    className: 'metadata-row'
                                }, React.createElement('strong', {}, `📸 ${formatTimestamp(screenshot.timestamp)}`)),
                                screenshot.botStatus && [
                                    React.createElement('div', {
                                        key: 'pos',
                                        className: 'metadata-row'
                                    }, `📍 Position: ${formatPosition(screenshot.botStatus.position)}`),
                                    React.createElement('div', {
                                        key: 'view',
                                        className: 'metadata-row'
                                    }, `👁️ View: Yaw ${(screenshot.botStatus.yaw * 180 / Math.PI).toFixed(1)}°, Pitch ${(screenshot.botStatus.pitch * 180 / Math.PI).toFixed(1)}°`),
                                    React.createElement('div', {
                                        key: 'stats',
                                        className: 'metadata-row'
                                    }, `🌍 ${screenshot.botStatus.biome} | ❤️ ${screenshot.botStatus.health}/20 | 🍖 ${screenshot.botStatus.food}/20`),
                                    screenshot.botStatus.lookingAt && React.createElement('div', {
                                        key: 'looking',
                                        className: 'metadata-row'
                                    }, `👀 Looking at: ${screenshot.botStatus.lookingAt.name} (${screenshot.botStatus.lookingAt.distance.toFixed(1)} blocks)`)
                                ]
                            ].filter(Boolean)))
                        ]);
                    }
                }),
                React.createElement('div', {
                    key: 'status',
                    className: 'gallery-status'
                }, screenshotList.length > 0 && React.createElement('span', {}, 
                    `${currentIndex + 1} of ${screenshotList.length} screenshots`
                ))
            ]);
        };

        // Mount the component
        const galleryRoot = document.getElementById('gallery-root');
        ReactDOM.render(React.createElement(ScreenshotGallery, {}), galleryRoot);

        // Test functions
        function loadMockScreenshots() {
            const mockScreenshots = [];
            for (let i = 0; i < 5; i++) {
                mockScreenshots.push(generateMockScreenshot(i));
            }
            if (window.updateScreenshotGallery) {
                window.updateScreenshotGallery(mockScreenshots);
            }
        }

        function clearScreenshots() {
            if (window.updateScreenshotGallery) {
                window.updateScreenshotGallery([]);
            }
        }

        function addSingleScreenshot() {
            const existingCount = window.currentScreenshots ? window.currentScreenshots.length : 0;
            const newScreenshot = generateMockScreenshot(existingCount);
            const currentList = window.currentScreenshots || [];
            const updatedList = [newScreenshot, ...currentList].slice(0, 20);
            window.currentScreenshots = updatedList;
            
            if (window.updateScreenshotGallery) {
                window.updateScreenshotGallery(updatedList);
            }
        }
    </script>
</body>
</html>
